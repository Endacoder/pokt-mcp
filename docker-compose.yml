services:
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - POCKET_DEFAULT_CHAIN=eth
      - REQUIRE_CONFIRMATION=true
      - MAX_SEND_VALUE_ETH=1.0

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - api
